  run: |
    docker pull --platform linux/arm64 ghcr.io/vectorize-io/hindsight:latest

- name: Save to tar.gz
  run: |
    docker save ghcr.io/vectorize-io/hindsight:latest | gzip -1 > hindsight_linux_arm64.tar.gz
    ls -lh hindsight_linux_arm64.tar.gz

- name: Upload artifact
  uses: actions/upload-artifact@v4
  with:
    name: hindsight_linux_arm64
    path: hindsight_linux_arm64.tar.gz
    compression-level: 0
