name: export-hindsight-image

on:
  workflow_dispatch: {}

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image (linux/arm64)
        run: |
          docker pull --platform linux/arm64 ghcr.io/vectorize-io/hindsight:latest

      - name: Save to tar.gz
        run: |
          docker save ghcr.io/vectorize-io/hindsight:latest | gzip -1 > hindsight_linux_arm64.tar.gz
          ls -lh hindsight_linux_arm64.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hindsight_linux_arm64
          path: hindsight_linux_arm64.tar.gz
          compression-level: 0
